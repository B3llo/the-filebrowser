name: Docs

on:
  pull_request:
    paths:
      - 'www'
      - '*.md'

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Install Task
        uses: go-task/setup-task@v2
      - name: Build site
        run: task docs
